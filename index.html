<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Work Manager</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0d47a1;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-top:20px;
}

.card{
background:white;
color:black;
padding:15px;
margin:15px;
border-radius:15px;
font-size:20px;
font-weight:bold;
}

button{
width:90%;
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:#2196F3;
color:white;
}
</style>
</head>

<body>

<h1>📡 Fiber Work Manager</h1>

<div class="card">📍 GPS Location</div>

<button onclick="startTravel()">🚗 Travel</button>

  <button onclick="finishTravel()">🛠 Installation</button>

<button>📞 SR</button>

<button>🏢 Site Visit</button>

<button>🔧 Site Restore</button>

<button onclick="uploadPhoto()">📷 Upload Photo</button>

<button onclick="showReport()">📊 Daily Report</button>
  <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
<script>
navigator.geolocation.getCurrentPosition(function(position){
document.querySelector(".card").innerHTML =
"📍 Latitude: " + position.coords.latitude + "<br>📍 Longitude: " + position.coords.longitude;
}, function(){
document.querySelector(".card").innerHTML = "❌ GPS Permission Denied";
});
  function startTravel() {
    
    navigator.geolocation.getCurrentPosition(function(pos){
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        localStorage.setItem("lastLat", lat);
        localStorage.setItem("lastLon", lon);

        alert("📍 Travel Started");
      localStorage.setItem("startTime", new Date().toLocaleString());
    });
}
  function finishTravel() {
  navigator.geolocation.getCurrentPosition(function(pos){

    let startLat = localStorage.getItem("lastLat");
    let startLon = localStorage.getItem("lastLon");

    let endLat = pos.coords.latitude;
    let endLon = pos.coords.longitude;
    localStorage.setItem("endTime", new Date().toLocaleString());
    alert(
      "Travel Complete!\n\n" +
      "Start: " + startLat + "," + startLon +
      "\nEnd: " + endLat + "," + endLon
    );

  });
  }
  function showReport() {
  let startTime = localStorage.getItem("startTime");
  let endTime = localStorage.getItem("endTime");
  let startLat = localStorage.getItem("lastLat");
  let startLon = localStorage.getItem("lastLon");

  alert(
    "📊 Daily Report\n\n" +
    "🕒 Start: " + startTime +
    "\n🕒 End: " + endTime +
    "\n📍 Start GPS: " + startLat + "," + startLon
  );
  }
  function uploadPhoto() {
  document.getElementById("photoInput").click();
}

document.getElementById("photoInput").onchange = function () {
  if (this.files.length > 0) {
    alert("📷 Photo Selected: " + this.files[0].name);
  }
};
</script>
</body>
</html>
