<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Work Manager</title>
<style>
body{font-family:Arial,sans-serif;background:#0d47a1;color:white;text-align:center;padding:20px}
.card{background:#fff;color:#000;padding:15px;margin:15px;border-radius:15px;font-size:20px;font-weight:bold}
button{width:90%;padding:15px;margin:10px;font-size:18px;border:none;border-radius:12px;background:#2196F3;color:#fff}
</style>
</head>
<body>

<h1>📡 Fiber Work Manager</h1>

<div class="card" id="gpsCard">📍 GPS Location</div>

<button onclick="startTravel()">🚗 Travel</button>
<button onclick="finishTravel()">🛠 Installation</button>
<button>📞 SR</button>
<button>🏢 Site Visit</button>
<button>🔧 Site Restore</button>
<button onclick="uploadPhoto()">📷 Upload Photo</button>
<button onclick="showReport()">📊 Daily Report</button>

<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

<script>
function updateGPS(){
 navigator.geolocation.getCurrentPosition(function(pos){
   document.getElementById("gpsCard").innerHTML=
   "📍 Latitude: "+pos.coords.latitude+"<br>📍 Longitude: "+pos.coords.longitude;
 },function(err){
   document.getElementById("gpsCard").innerHTML="❌ GPS Error: "+err.message;
 },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}
updateGPS();

function startTravel(){
 navigator.geolocation.getCurrentPosition(function(pos){
   localStorage.setItem("lastLat",pos.coords.latitude);
   localStorage.setItem("lastLon",pos.coords.longitude);
   localStorage.setItem("startTime",new Date().toLocaleString());
   alert("📍 Travel Started");
 },function(err){
   alert("GPS Error: "+err.message);
 },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

function finishTravel(){
 navigator.geolocation.getCurrentPosition(function(pos){
   localStorage.setItem("endLat",pos.coords.latitude);
   localStorage.setItem("endLon",pos.coords.longitude);
   localStorage.setItem("endTime",new Date().toLocaleString());
   alert("✅ Installation Complete");
 });
}

function showReport(){
 alert(
 "📊 Daily Report\n\n"+
 "🕒 Start: "+(localStorage.getItem("startTime")||"-")+
 "\n🕒 End: "+(localStorage.getItem("endTime")||"-")+
 "\n📍 Start GPS: "+(localStorage.getItem("lastLat")||"-")+","+(localStorage.getItem("lastLon")||"-")+
 "\n📍 End GPS: "+(localStorage.getItem("endLat")||"-")+","+(localStorage.getItem("endLon")||"-")
 );
}

function uploadPhoto(){
 document.getElementById("photoInput").click();
}
document.getElementById("photoInput").onchange=function(){
 if(this.files.length){
   alert("📷 Photo Selected: "+this.files[0].name);
 }
}
</script>
</body>
</html>
