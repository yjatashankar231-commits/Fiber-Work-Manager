<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Work Manager Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
<h1>📡 Fiber Work Manager Pro</h1>
<p>Field Engineer Dashboard</p>
</header>
<div class="dashboard">
<div class="card">
<h3>Installation</h3>
<span id="installationCount">0</span>
</div>
<div class="card">
<h3>SR</h3>
<span id="srCount">0</span>
</div>
<div class="card">
<h3>Site Visit</h3>
<span id="visitCount">0</span>
</div>
<div class="card">
<h3>Travel KM</h3>
<span id="travelKm">0</span>
</div>
</div>
<div class="menu">
<button onclick="openTravel()">🚗 Travel</button>
<button onclick="openInstallation()">🛠 Installation</button>
<button onclick="openSR()">📞 SR</button>
<button onclick="openVisit()">🏢 Site Visit</button>
<button onclick="openRestore()">🔧 Site Restore</button>
<button onclick="openCamera()">📷 Upload Photo</button>
<button onclick="showReport()">📊 Report</button>
<button onclick="exportExcel()">📄 Export Excel</button>
</div>
<div id="content"></div>
<script src="app.js"></script>
</body>
</html>
