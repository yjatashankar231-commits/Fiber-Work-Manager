<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Fiber Work Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#edf3fb;
}

.header{

background:linear-gradient(135deg,#1565C0,#42A5F5);

padding:25px;

color:white;

border-radius:0 0 25px 25px;

text-align:center;

}

.header h1{

font-size:26px;

}

.header p{

margin-top:5px;

opacity:.9;

}

.dashboard{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:12px;

padding:15px;

}

.card{

background:white;

padding:18px;

border-radius:18px;

box-shadow:0 3px 10px rgba(0,0,0,.15);

text-align:center;

}

.card h2{

font-size:28px;

color:#1565C0;

}

.card p{

margin-top:8px;

font-size:14px;

color:#666;

}

.section{

padding:15px;

}

button{

width:100%;

padding:16px;

margin-top:12px;

font-size:18px;

font-weight:bold;

border:none;

border-radius:15px;

background:#1976D2;

color:white;

}

button:active{

transform:scale(.98);

}

.gps{

background:white;

margin:15px;

padding:18px;

border-radius:18px;

box-shadow:0 3px 10px rgba(0,0,0,.15);

}

.bottom{

position:fixed;

bottom:0;

left:0;

width:100%;

background:white;

display:flex;

justify-content:space-around;

padding:12px;

box-shadow:0 -3px 10px rgba(0,0,0,.2);

}

.bottom div{

text-align:center;

font-size:13px;

font-weight:bold;

color:#1565C0;

}

</style>

</head>

<body>

<div class="header">

<h1>📡 Fiber Work Manager</h1>

<p>Professional Field Engineer App</p>

</div>

<div class="dashboard">

<div class="card">

<h2 id="installCount">0</h2>

<p>Installation</p>

</div>

<div class="card">

<h2 id="srCount">0</h2>

<p>SR</p>

</div>

<div class="card">

<h2 id="travelKm">0 KM</h2>

<p>Travel</p>

</div>

<div class="card">

<h2 id="todayWork">0</h2>

<p>Today's Work</p>

</div>

</div>

<div class="gps">

<h3>📍 Live GPS</h3>

<p id="gpsText">

Waiting for GPS...

</p>

</div>

<div class="section">

<button onclick="showInstallation()">

🛠 Installation

</button>

<button onclick="showSR()">

📞 SR

</button>

<button onclick="showVisit()">

🏢 Site Visit

</button>

<button onclick="showRestore()">

🔧 Site Restore

</button>

<button onclick="showTravel()">

🚗 Travel

</button>

<button onclick="showReport()">

📊 Daily Report

</button>

<button onclick="exportExcel()">

📄 Export Excel

</button>

<button onclick="uploadPhoto()">

📷 Upload Photo

</button>

<input
type="file"
id="photoInput"
accept="image/*"
capture="environment"
style="display:none">
<!-- ================= INSTALLATION FORM ================= -->

<div id="installationForm" style="display:none;padding:15px;">

<h2>🛠 Installation</h2>

<input type="text" id="instCustomer" placeholder="Customer Name">

<input type="tel" id="instMobile" placeholder="Mobile Number">

<input type="text" id="instAddress" placeholder="Address">

<input type="text" id="instSociety" placeholder="Society Name">

<input type="text" id="instFlat" placeholder="Flat No">

<input type="text" id="instRA" placeholder="RA Number">

<input type="text" id="instISP" placeholder="ISP Company">

<input type="text" id="instPower" placeholder="Power Reading">

<textarea id="instRemark" placeholder="Remarks"></textarea>

<button onclick="saveInstallation()">💾 Save Installation</button>

</div>

<!-- ================= SR FORM ================= -->

<div id="srForm" style="display:none;padding:15px;">

<h2>📞 SR</h2>

<input type="text" id="srCustomer" placeholder="Customer Name">

<input type="tel" id="srMobile" placeholder="Mobile Number">

<input type="text" id="srNumber" placeholder="SR Number">

<input type="text" id="srISP" placeholder="ISP Company">

<input type="text" id="srProblem" placeholder="Complaint">

<textarea id="srRemark" placeholder="Remarks"></textarea>

<button onclick="saveSR()">💾 Save SR</button>

</div>

<!-- ================= SITE VISIT ================= -->

<div id="visitForm" style="display:none;padding:15px;">

<h2>🏢 Site Visit</h2>

<input type="text" id="visitSite" placeholder="Site Name">

<input type="text" id="visitAddress" placeholder="Address">

<input type="text" id="visitEngineer" placeholder="Engineer Name">

<textarea id="visitRemark" placeholder="Remarks"></textarea>

<button onclick="saveVisit()">💾 Save Site Visit</button>

</div>

<!-- ================= SITE RESTORE ================= -->

<div id="restoreForm" style="display:none;padding:15px;">

<h2>🔧 Site Restore</h2>

<input type="text" id="restoreSite" placeholder="Site Name">

<input type="text" id="restoreISP" placeholder="ISP Company">

<input type="text" id="restoreFault" placeholder="Fault">

<textarea id="restoreRemark" placeholder="Remarks"></textarea>

<button onclick="saveRestore()">💾 Save Restore</button>

</div>

<!-- ================= TRAVEL ================= -->

<div id="travelForm" style="display:none;padding:15px;">

<h2>🚗 Travel</h2>

<input type="text" id="travelFrom" placeholder="From">

<input type="text" id="travelTo" placeholder="To">

<input type="number" id="travelKmInput" placeholder="KM">

<button onclick="startTravel()">▶ Start Travel</button>

<button onclick="finishTravel()">⏹ End Travel</button>

</div>

<style>

input,
textarea,
select{

width:100%;

padding:14px;

margin-top:10px;

border-radius:12px;

border:1px solid #ccc;

font-size:16px;

}

textarea{

height:90px;

resize:none;

}

</style>
<script>

// Dashboard Count
let installation = 0;
let sr = 0;
let visit = 0;
let restore = 0;

// Hide All Forms
function hideForms(){
document.getElementById("installationForm").style.display="none";
document.getElementById("srForm").style.display="none";
document.getElementById("visitForm").style.display="none";
document.getElementById("restoreForm").style.display="none";
document.getElementById("travelForm").style.display="none";
}

// Open Forms
function showInstallation(){
hideForms();
document.getElementById("installationForm").style.display="block";
}

function showSR(){
hideForms();
document.getElementById("srForm").style.display="block";
}

function showVisit(){
hideForms();
document.getElementById("visitForm").style.display="block";
}

function showRestore(){
hideForms();
document.getElementById("restoreForm").style.display="block";
}

function showTravel(){
hideForms();
document.getElementById("travelForm").style.display="block";
}

// GPS
function updateGPS(){

navigator.geolocation.getCurrentPosition(function(pos){

"📍 Latitude : "+pos.coords.latitude.toFixed(6)+"<br>"+

"📍 Longitude : "+pos.coords.longitude.toFixed(6);

});

}

// ===== Travel =====

let startLat = 0;
let startLng = 0;

function startTravel(){

navigator.geolocation.getCurrentPosition(function(pos){

startLat = pos.coords.latitude;
startLng = pos.coords.longitude;

localStorage.setItem("startLat",startLat);
localStorage.setItem("startLng",startLng);
localStorage.setItem("startTime",new Date().toLocaleString());

alert("🚗 Travel Started");

});

}

function finishTravel(){

navigator.geolocation.getCurrentPosition(function(pos){

let endLat = pos.coords.latitude;
let endLng = pos.coords.longitude;

localStorage.setItem("endLat",endLat);
localStorage.setItem("endLng",endLng);
localStorage.setItem("endTime",new Date().toLocaleString());

let km = calculateDistance(
startLat,
startLng,
endLat,
endLng
);

document.getElementById("travelKm").innerHTML =
km.toFixed(2)+" KM";

localStorage.setItem("travelKm",km.toFixed(2));

alert("✅ Travel Completed\n\n"+km.toFixed(2)+" KM");

});

}

function exportExcel(){

let csv =
"Work Type,Customer,Mobile,Company,Date,KM\n";

csv +=
"Installation,,," +
(localStorage.getItem("travelKm")||0) +
"," +
new Date().toLocaleDateString() +
"\n";

let blob = new Blob([csv],{type:"text/csv"});

let a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "Fiber_Work_Report.csv";

a.click();

}

// ===== Auto Restore =====

window.onload=function(){

document.getElementById("travelKm").innerHTML =
(localStorage.getItem("travelKm")||0)+" KM";

updateGPS();

};

// ===== Bottom Navigation =====

hideForms();

</script>

<div class="bottom">

<div onclick="showInstallation()">
🛠<br>
Install
</div>

<div onclick="showSR()">
📞<br>
SR
</div>

<div onclick="showVisit()">
🏢<br>
Visit
</div>

<div onclick="showTravel()">
🚗<br>
Travel
</div>

<div onclick="showReport()">
📊<br>
Report
</div>

</div>

</body>
</html>
