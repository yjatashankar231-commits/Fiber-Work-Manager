<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Work Manager</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0d47a1;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-top:20px;
}

.card{
background:white;
color:black;
padding:15px;
margin:15px;
border-radius:15px;
font-size:20px;
font-weight:bold;
}

button{
width:90%;
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:#2196F3;
color:white;
}
</style>
</head>

<body>

<h1>📡 Fiber Work Manager</h1>

<div class="card">📍 GPS Location</div>

<button>🚗 Travel</button>

<button>🛠 Installation</button>

<button>📞 SR</button>

<button>🏢 Site Visit</button>

<button>🔧 Site Restore</button>

<button>📷 Upload Photo</button>

<button>📊 Daily Report</button>
<script>
navigator.geolocation.getCurrentPosition(function(position){
document.querySelector(".card").innerHTML =
"📍 Latitude: " + position.coords.latitude + "<br>📍 Longitude: " + position.coords.longitude;
}, function(){
document.querySelector(".card").innerHTML = "❌ GPS Permission Denied";
});
</script>
</body>
</html>
